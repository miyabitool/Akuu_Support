<script>
function elem2img_demo () {
	var elem = document.getElementById("tlist");
	var scale = 1;
	var quality = 100;

	var e2i = new Elem2Img();
	e2i.get_jpeg(function (img_data) {
		Elem2Img.save_image(img_data, "img.jpg");
	}, elem, scale, quality);

}
</script>
<button type="button" onclick="elem2img_demo();" style="width: 150px; margin: 5px; font-size: 20px;">画像に変換</button>

<div id="demo_img_area"></div>

<script>
  // すべてのチェックボックスを取得
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');

  // それぞれにイベントリスナーを設定
  checkboxes.forEach((checkbox) => {
    checkbox.addEventListener('change', (event) => {
		let elements = document.querySelectorAll("." + event.target.id);
		elements.forEach((element) => {
			element.classList.toggle("von");
		});
	  // チェックされた時だけ実行
      if (event.target.checked) {
        const clickedId = event.target.id;
        console.log('チェックされたID: ' + clickedId);
      }
    });
  });
</script>
